name: Release Helm Chart

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: release-chart-${{ github.ref }}
  cancel-in-progress: false

env:
  CHART_PATH: charts/nextd
  CHART_DIST: .cr-release-packages
  PAGES_BRANCH: gh-pages

jobs:
  package:
    name: Package Helm Chart
    runs-on: ubuntu-latest
    outputs:
      chart_version: ${{ steps.chart_meta.outputs.chart_version }}
      chart_archive: ${{ steps.chart_meta.outputs.chart_archive }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.4

      - name: Lint chart
        run: helm lint ${{ env.CHART_PATH }}

      - name: Render chart
        run: helm template nextd ${{ env.CHART_PATH }} > /tmp/nextd-chart-rendered.yaml

      - name: Extract chart metadata
        id: chart_meta
        shell: bash
        run: |
          chart_version=$(awk '/^version:/ {print $2}' "${CHART_PATH}/Chart.yaml")
          chart_name=$(awk '/^name:/ {print $2}' "${CHART_PATH}/Chart.yaml")
          echo "chart_version=${chart_version}" >> "$GITHUB_OUTPUT"
          echo "chart_archive=${chart_name}-${chart_version}.tgz" >> "$GITHUB_OUTPUT"

      - name: Package chart
        run: |
          mkdir -p "${CHART_DIST}"
          helm package "${CHART_PATH}" --destination "${CHART_DIST}"

      - name: Upload packaged chart
        uses: actions/upload-artifact@v4
        with:
          name: packaged-chart
          path: ${{ env.CHART_DIST }}/*.tgz
          if-no-files-found: error

  publish-pages:
    name: Publish Helm Repo to GitHub Pages
    runs-on: ubuntu-latest
    needs: package
    steps:
      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: ${{ env.PAGES_BRANCH }}
          path: gh-pages
        continue-on-error: true

      - name: Download packaged chart
        uses: actions/download-artifact@v4
        with:
          name: packaged-chart
          path: ${{ env.CHART_DIST }}

      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.4

      - name: Prepare pages workspace
        shell: bash
        run: |
          mkdir -p gh-pages
          cp "${CHART_DIST}"/*.tgz gh-pages/

      - name: Build or update chart index
        shell: bash
        run: |
          repo_url="https://${GITHUB_REPOSITORY_OWNER}.github.io/${GITHUB_REPOSITORY#*/}"
          if [ -f gh-pages/index.yaml ]; then
            helm repo index gh-pages --url "$repo_url" --merge gh-pages/index.yaml
          else
            helm repo index gh-pages --url "$repo_url"
          fi

      - name: Publish to GitHub Pages branch
        shell: bash
        run: |
          cd gh-pages
          git init
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Publish Helm chart for ${GITHUB_REF_NAME}" || echo "No changes to commit"
          git branch -M "${PAGES_BRANCH}"
          git remote remove origin 2>/dev/null || true
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push --force origin "${PAGES_BRANCH}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release:
    name: Attach Chart To GitHub Release
    runs-on: ubuntu-latest
    needs:
      - package
      - publish-pages
    steps:
      - name: Download packaged chart
        uses: actions/download-artifact@v4
        with:
          name: packaged-chart
          path: ${{ env.CHART_DIST }}

      - name: Generate checksums
        shell: bash
        run: |
          cd "${CHART_DIST}"
          sha256sum *.tgz > checksums.txt

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          append_body: true
          files: |
            ${{ env.CHART_DIST }}/*.tgz
            ${{ env.CHART_DIST }}/checksums.txt
          body: |
            Helm chart published to GitHub Pages.

            Repository URL:
            `https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}`
