name: Release Helm Chart

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  packages: write

concurrency:
  group: release-chart-${{ github.ref }}
  cancel-in-progress: false

env:
  CHART_PATH: charts/nextd
  CHART_DIST: chart-packages
  REGISTRY: ghcr.io

jobs:
  release-chart:
    name: Package And Publish Helm Chart
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.4

      - name: Prepare chart metadata
        id: chart_meta
        shell: bash
        run: |
          chart_version=$(awk '/^version:/ {print $2}' "${CHART_PATH}/Chart.yaml")
          chart_name=$(awk '/^name:/ {print $2}' "${CHART_PATH}/Chart.yaml")
          registry_namespace=$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')
          chart_ref="oci://${REGISTRY}/${registry_namespace}/charts/${chart_name}"
          push_ref="oci://${REGISTRY}/${registry_namespace}/charts"

          echo "chart_version=${chart_version}" >> "$GITHUB_OUTPUT"
          echo "chart_name=${chart_name}" >> "$GITHUB_OUTPUT"
          echo "chart_archive=${chart_name}-${chart_version}.tgz" >> "$GITHUB_OUTPUT"
          echo "chart_ref=${chart_ref}" >> "$GITHUB_OUTPUT"
          echo "push_ref=${push_ref}" >> "$GITHUB_OUTPUT"

      - name: Lint chart
        run: helm lint ${{ env.CHART_PATH }}

      - name: Render chart
        run: helm template nextd ${{ env.CHART_PATH }} > /tmp/nextd-chart-rendered.yaml

      - name: Package chart
        shell: bash
        run: |
          mkdir -p "${CHART_DIST}"
          helm package "${CHART_PATH}" --destination "${CHART_DIST}"

      - name: Verify packaged chart
        shell: bash
        run: |
          test -f "${CHART_DIST}/${{ steps.chart_meta.outputs.chart_archive }}"
          ls -la "${CHART_DIST}"

      - name: Login to GHCR Helm registry
        shell: bash
        run: echo "${GITHUB_TOKEN}" | helm registry login "${REGISTRY}" --username "${GITHUB_ACTOR}" --password-stdin
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Push chart to GHCR OCI registry
        run: helm push "${{ env.CHART_DIST }}/${{ steps.chart_meta.outputs.chart_archive }}" "${{ steps.chart_meta.outputs.push_ref }}"

      - name: Generate checksums
        shell: bash
        run: |
          cd "${CHART_DIST}"
          sha256sum *.tgz > checksums.txt

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          append_body: true
          files: |
            ${{ env.CHART_DIST }}/*.tgz
            ${{ env.CHART_DIST }}/checksums.txt
          body: |
            Helm chart published to GHCR OCI.

            Install:
            `helm install nextd ${{ steps.chart_meta.outputs.chart_ref }} --version ${{ steps.chart_meta.outputs.chart_version }}`
