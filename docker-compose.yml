services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: nexd:local
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: nexd
      DB_PASSWORD: nexd
      DB_NAME: nexd
      DB_SSLMODE: disable
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: 8080
    ports:
      - "8484:8080"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - .:/workspace:cached
    restart: "no"

  postgres:
    image: pgvector/pgvector:pg18
    environment:
      POSTGRES_USER: nexd
      POSTGRES_PASSWORD: nexd
      POSTGRES_DB: nexd
    ports:
      - "5436:5432"
    volumes:
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexd -d nexd"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

volumes:
  postgres-data:
